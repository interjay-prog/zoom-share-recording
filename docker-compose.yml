version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: zoom_share_db
    environment:
      POSTGRES_USER: zoom_user
      POSTGRES_PASSWORD: zoom_password
      POSTGRES_DB: zoom_share
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zoom_user -d zoom_share"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
